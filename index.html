<!DOCTYPE html> <!-- This is an HTML5 doctype declaration -->
<html lang="en">
<head> 
    <!-- head: meta, title, link/script -->
    <!-- Character encoding and viewport for responsive design (SETUP) -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Page title (appears in browser tab) -->
    <title>My Basic HTML Template</title>
    
    <!-- ====== Internal/External CSS Reference ====== -->
    <!-- ======  CSS REFERENCE CAN ONLY BE MADE HERE ====== -->

    <!-- EXTERNAL CSS LINK (OPTION 1/2) -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- INTERNAL STYLES (OPTION 2/2) -->
    <style>
        /* Internal CSS (optional) - comment out if using only external */
    </style>
</head>

<body>
    <!-- ===== ALL VISIBLE CONTENT GOES HERE ===== -->
    
    <header>
        <h1>Hello, World!</h1>
        <h1>And WELCOME to Mani's HTML Template</h1>
        <p>This was a basic HTML template, but I will now be using to record/teach some HTML to people interested in basic web development</p>
    </header>
    
    <main>
        <section>
            <h2>(H2) Content Section</h2>
            <p> (p)Add your content here.</p>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2026</p>
    </footer>
    
    <!-- ===== SCRIPTS GO AT THE END OF BODY ===== -->
    <!-- Link to external JavaScript file -->
    <script src="script.js"></script>
    
    <!-- Internal JavaScript (optional) -->
    <script>
        // Your JavaScript code here
        console.log('Page loaded!');
    </script>
</body>
</html>

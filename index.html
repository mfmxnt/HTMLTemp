<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding and viewport for responsive design -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Page title (appears in browser tab) -->
    <title>My Basic HTML Template</title>
    
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- You can also add internal CSS here if needed -->
    <style>
        /* Internal CSS (optional) - remove if using only external */
    </style>
</head>
<body>
    <!-- ===== ALL VISIBLE CONTENT GOES HERE ===== -->
    
    <header>
        <h1>Hello, World!</h1>
        <p>This is a basic HTML template.</p>
    </header>
    
    <main>
        <section>
            <h2>Content Section</h2>
            <p>Add your content here.</p>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2026</p>
    </footer>
    
    <!-- ===== SCRIPTS GO AT THE END OF BODY ===== -->
    <!-- Link to external JavaScript file -->
    <script src="script.js"></script>
    
    <!-- Internal JavaScript (optional) -->
    <script>
        // Your JavaScript code here
        console.log('Page loaded!');
    </script>
</body>
</html>
